name: build

on:
  push:
    tags: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        id: build
        with:
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/filipjsowa/fprime-arm:${{ github.ref_name }}
            ghcr.io/filipjsowa/fprime-arm:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false
          sbom: true
      
      - uses: sigstore/cosign-installer@v4.0.0

      - run: cosign sign --yes ghcr.io/filipjsowa/fprime-arm@${{ steps.build.outputs.digest }}